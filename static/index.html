<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AmneziaWG · Панель управления</title>
<script>
  // применяем сохранённую тему ДО отрисовки, чтобы не было "мигания" темой
  (function () {
    var saved = localStorage.getItem("awg-theme");
    var theme = saved === "light" || saved === "dark" ? saved : "dark";
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar__left">
    <div class="brand">
      <span class="brand__mark" aria-hidden="true"></span>
      <div class="brand__text">
        <div class="brand__title">AmneziaWG <span class="brand__version" id="appVersion"></span></div>
        <div class="brand__subtitle" id="containerName">панель управления пирами</div>
      </div>
    </div>
  </div>
  <div class="topbar__right">
    <span class="fetched-at" id="fetchedAt">—</span>
    <button class="btn btn--ghost" id="themeToggle" title="Переключить тему" aria-label="Переключить тему">
      <svg class="icon icon--moon" viewBox="0 0 20 20" fill="none"><path d="M16 12.5A6.5 6.5 0 0 1 7.5 4a6.5 6.5 0 1 0 8.5 8.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      <svg class="icon icon--sun" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="3.6" stroke="currentColor" stroke-width="1.6"/><path d="M10 2.5v2M10 15.5v2M17.5 10h-2M4.5 10h-2M15.1 4.9l-1.4 1.4M6.3 13.7l-1.4 1.4M15.1 15.1l-1.4-1.4M6.3 6.3 4.9 4.9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <button class="btn btn--ghost" id="refreshBtn">
      <svg class="icon" viewBox="0 0 20 20" fill="none"><path d="M4 10a6 6 0 0 1 10.2-4.3M16 10a6 6 0 0 1-10.2 4.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14 3v3h-3M6 17v-3h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Обновить
    </button>
    <label class="toggle toggle--autorefresh">
      <input type="checkbox" id="autoRefreshToggle">
      <span>Авто (10с)</span>
    </label>
  </div>
</div>

<main class="container">

  <section class="stats" id="stats">
    <div class="stat-card">
      <div class="stat-card__value" id="statTotal">—</div>
      <div class="stat-card__label">всего пиров</div>
    </div>
    <div class="stat-card stat-card--live">
      <div class="stat-card__value" id="statActive">—</div>
      <div class="stat-card__label">активны</div>
    </div>
    <div class="stat-card stat-card--danger">
      <div class="stat-card__value" id="statBlocked">—</div>
      <div class="stat-card__label">заблокированы</div>
    </div>
    <div class="stat-card stat-card--muted">
      <div class="stat-card__value" id="statNever">—</div>
      <div class="stat-card__label">никогда не подключались</div>
    </div>
  </section>

  <section class="toolbar">
    <div class="search">
      <svg class="icon" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6"/><path d="M17 17l-4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Поиск по имени или IP…" autocomplete="off">
    </div>
    <div class="segmented" id="statusFilter" role="tablist">
      <button class="segmented__btn is-active" data-status="all" role="tab">Все</button>
      <button class="segmented__btn" data-status="online" role="tab">Онлайн</button>
      <button class="segmented__btn" data-status="blocked" role="tab">Заблокированные</button>
    </div>
    <label class="toggle">
      <input type="checkbox" id="includeNeverToggle">
      <span>Показывать тех, кто никогда не подключался</span>
    </label>
  </section>

  <section class="table-wrap">
    <table class="peers">
      <thead>
        <tr>
          <th class="col-num">#</th>
          <th>Имя</th>
          <th>IP</th>
          <th>Endpoint</th>
          <th>Последний handshake</th>
          <th>Статус</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="empty-state">Загрузка…</td></tr>
      </tbody>
    </table>
  </section>

</main>

<div class="toast-stack" id="toastStack"></div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-box__title" id="confirmTitle">Подтверждение</div>
    <div class="confirm-box__text" id="confirmText"></div>
    <div class="confirm-box__actions">
      <button class="btn btn--ghost" id="confirmCancel">Отмена</button>
      <button class="btn btn--danger" id="confirmOk">Подтвердить</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="reissueOverlay">
  <div class="reissue-box">
    <div class="reissue-box__title" id="reissueTitle">Клиент перевыпущен</div>
    <div class="reissue-box__subtitle" id="reissueSubtitle"></div>
    <div class="reissue-box__qr">
      <img id="reissueQr" alt="QR-код нового конфига">
    </div>
    <div class="reissue-box__hint">Отсканируй в приложении Amnezia либо скачай файл ниже</div>
    <div class="reissue-box__actions">
      <button class="btn" id="reissueDownload">Скачать .conf</button>
      <button class="btn" id="reissueCopy">Скопировать текст</button>
    </div>
    <button class="reissue-box__close" id="reissueClose">Закрыть</button>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
